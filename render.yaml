services:
  - type: web
    name: swv-tool
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MPLCONFIGDIR
        value: /tmp/mplconfig
      - key: SWV_SECRET_KEY
        generateValue: true
